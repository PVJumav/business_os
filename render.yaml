services:
  - type: web
    name: business-os-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH="$(pwd):$(dirname "$(pwd)")" python -m backend.core.create_tables && PYTHONPATH="$(pwd):$(dirname "$(pwd)")" uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: business-os-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SQL_ECHO
        value: "false"

databases:
  - name: business-os-db
    databaseName: business_os
    user: business_os_user
