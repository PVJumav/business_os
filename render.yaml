services:
  - type: web
    name: business-os-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.core.create_tables && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SQL_ECHO
        value: "false"
